services:
  postgres:
    image: postgres:16
    container_name: wp_labs_db_2
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pg_data_2:/var/lib/postgresql/data
    networks:
      - app_net_2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: wp_labs_app_2
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PORT: 4200
    ports:
      - "4202:4200"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net_2

volumes:
  pg_data_2:

networks:
  app_net_2: